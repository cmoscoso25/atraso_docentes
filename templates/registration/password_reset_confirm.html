{% extends "atrasos/base_login.html" %}

{% block contenido_login %}

<div class="login-card">
    <h2>Nueva contraseña</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="login-submit">
            Cambiar contraseña
        </button>
    </form>
</div>

{% endblock %}
